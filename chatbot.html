<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    
    <script type="text/babel">

      function ChatInput({chatMessages, setChatMessages}){
        const [inputText, setInputText] = React.useState("");
        const [isLoading, setIsLoading] = React.useState(false);

        function saveInputText(event){
          setInputText(event.target.value)
        }
        
        async function sendMessage(){
          if (isLoading || inputText === '') {
            return;
          }
          setIsLoading(true);

          setInputText(""); // We can still use the inputText variable here because of closures in JavaScript. Also the state update is asynchronous, so the inputText variable will still hold the old value until the next render.

          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ];
          setChatMessages(newChatMessages);
          setChatMessages([
            ...newChatMessages,
            {
              message: 'Loading...',
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);

          const response = await Chatbot.getResponseAsync(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);

          setIsLoading(false);
        }

        function inputMethods(event){
          if(event.key=="Enter") sendMessage();
          if(event.key=="Escape") setInputText("");
        }

        return (
          <>
            <input 
              placeholder="write your message"
              onChange={saveInputText}
              value={inputText}
              onKeyDown={inputMethods}
            />
            <button onClick={sendMessage}>Send</button>  
          </>
        );
      }

      function ChatMessage(props){
        const {message, sender} = props;

        // && -> Guard operator -> Returns the first falsy operand or the last operand if all are truthy.
        return (
          <div>
            {sender==="robot" && <img src="robot.png" width="50" />}
            {message}
            {sender==="user" && <img src="user.png" width="50" />}
          </div>
        );
      }
      
      function ChatMessages({chatMessages}){
        // const [chatMessages, setChatMessages] = React.useState([{}]); 
        // const chatMessages = arr[0]; // Data
        // const setChatMessages = arr[1]; // Updater Function
        // State lifted to parent Component for sharing

        return (
          <>
            {chatMessages.map((chatMessage)=>{
              return (
                <ChatMessage 
                message={chatMessage.message} 
                sender={chatMessage.sender} 
                key={chatMessage.id} />
              );
            })}
          </>
        );
      }

      function App(){ 
        const arr = React.useState([]);
        const [chatMessages, setChatMessages] = arr;
        
        return (
          <>
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}  
            />
            <ChatMessages
              chatMessages={chatMessages} 
            />
          </>
        );
      }
      
      const container = document.querySelector('.js-container');
      const root=ReactDOM.createRoot(container);
      root.render(<App />);

    </script>
  </body>
</html>
