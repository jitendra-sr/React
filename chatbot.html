<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>

  <style>
    .send-button{
      background-color: #4CAF50; /* Green */
      border: none;
      color: white;
      padding: 10px 20px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      margin-left: 10px;
      cursor: pointer;
    }
  </style>

  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    
    <script type="text/babel">

      function ChatInput({chatMessages, setChatMessages}){
        const [inputText, setInputText] = React.useState("");
        const [isLoading, setIsLoading] = React.useState(false);

        function saveInputText(event){
          setInputText(event.target.value)
        }

        async function sendMessage(){
          if (isLoading || inputText === '') {
            return;
          }
          setIsLoading(true);

          setInputText(""); // We can still use the inputText variable here because of closures in JavaScript. Also the state update is asynchronous, so the inputText variable will still hold the old value until the next render.

          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ];
          setChatMessages(newChatMessages);
          setChatMessages([
            ...newChatMessages,
            {
              message: 'Loading...',
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);

          const response = await Chatbot.getResponseAsync(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);

          setIsLoading(false);
        }

        function inputMethods(event){
          if(event.key=="Enter") sendMessage();
          if(event.key=="Escape") setInputText("");
        }

        return (
          <>
            <input 
              placeholder="write your message"
              onChange={saveInputText}
              value={inputText}
              onKeyDown={inputMethods}
            />
            <button 
            onClick={sendMessage}
            className="send-button" > Send 
            </button>  
            </>
            // className is used instead of class because JSX is Javascript and class is a reserved keyword in JavaScript. React uses className in JSX to avoid conflicts with the JavaScript keyword.
            // Also In the DOM API, the property name is actually: className, not class. So when React renders the JSX, it translates className to class in the actual HTML elements in the DOM
            // JSX attributes match DOM property names, not raw HTML attributes eg. className instead of class, htmlFor instead of for, etc.
        );
      }

      function ChatMessage(props){
        const {message, sender} = props;

        // && -> Guard operator -> Returns the first falsy operand or the last operand if all are truthy.
        return (
          <div>
            {sender==="robot" && <img src="robot.png" width="50" />}
            {message}
            {sender==="user" && <img src="user.png" width="50" />}
          </div>
        );
      }
      
      function ChatMessages({chatMessages}){
        // const [chatMessages, setChatMessages] = React.useState([{}]); 
        // const chatMessages = arr[0]; // Data
        // const setChatMessages = arr[1]; // Updater Function
        // State lifted to parent Component for sharing

        const chatMsgRef = React.useRef(null); // Used instead of document.querySelector.
        // Accessed it inside useEffect because we have to wait untill the Cmp is created to access the html and useEffect runs after the Cmp is created.
        React.useEffect(()=>{ 
          const chatMsgElm = chatMsgRef.current;
          if(chatMsgElm) {
            chatMsgElm.scrollTop = chatMsgElm.scrollHeight;
          }
        },[chatMessages]);

        return (
          <div ref={chatMsgRef}>
            {chatMessages.map((chatMessage)=>{
              return (
                <ChatMessage 
                message={chatMessage.message} 
                sender={chatMessage.sender} 
                key={chatMessage.id} />
              );
            })}
          </div>
        );
      }

      function App(){ 
        const arr = React.useState([]);
        const [chatMessages, setChatMessages] = arr;
        
        return (
          <>
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}  
            />
            <ChatMessages
              chatMessages={chatMessages} 
            />
          </>
        );
      }
      
      const container = document.querySelector('.js-container');
      const root=ReactDOM.createRoot(container);
      root.render(<App />);

    </script>
  </body>
</html>
